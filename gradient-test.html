<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gradient Glow Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
    background: #F0F2F5;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 40px;
    padding: 48px 32px;
    min-height: 100vh;
  }

  /* ── Left: previews ── */
  .previews {
    display: flex;
    flex-direction: column;
    gap: 32px;
    align-items: center;
    flex: 1;
    max-width: 480px;
  }
  .preview-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 4px;
    align-self: flex-start;
  }
  .preview-block {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* ── Input bar ── */
  .bar-wrap {
    background: #fff;
    border-radius: 20px;
    padding: 32px 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* @property lets us animate the conic-gradient start angle */
  @property --bar-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  .lab-exp-bar {
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    gap: 10px;
    /* Gradient border: white fill + rotating conic border */
    background:
      linear-gradient(#fff, #fff) padding-box,
      conic-gradient(from var(--bar-angle), var(--c1), var(--c2), var(--c3), var(--c1)) border-box;
    border: var(--stroke, 1.5px) solid transparent;
    border-radius: 16px;
    padding: 0 8px 0 16px;
    height: 54px;
    /* Glow animation runs in sync with rotation */
    animation:
      bar-border-spin var(--speed, 4s) linear infinite,
      bar-glow-spin   var(--speed, 4s) linear infinite;
  }

  @keyframes bar-border-spin {
    to { --bar-angle: 360deg; }
  }

  /* Glow cycles through the same 3 colors as the border spins */
  @keyframes bar-glow-spin {
    0%   { box-shadow: 0 0 var(--gi) var(--c1-rgb-glow), 0 0 var(--go) var(--c1-rgb-outer), 0 2px 8px rgba(0,0,0,0.05); }
    33%  { box-shadow: 0 0 var(--gi) var(--c2-rgb-glow), 0 0 var(--go) var(--c2-rgb-outer), 0 2px 8px rgba(0,0,0,0.05); }
    66%  { box-shadow: 0 0 var(--gi) var(--c3-rgb-glow), 0 0 var(--go) var(--c3-rgb-outer), 0 2px 8px rgba(0,0,0,0.05); }
    100% { box-shadow: 0 0 var(--gi) var(--c1-rgb-glow), 0 0 var(--go) var(--c1-rgb-outer), 0 2px 8px rgba(0,0,0,0.05); }
  }

  .bar-icon { flex-shrink: 0; }
  .bar-input {
    flex: 1; border: none; background: none;
    font-size: 14px; color: #0D0D0D; outline: none;
  }
  .bar-input::placeholder { color: #B0B8C8; }

  .bar-send {
    height: 36px; width: 36px; border-radius: 11px; flex-shrink: 0;
    background: var(--c1, #006AFF);
    border: none; color: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: width 0.24s cubic-bezier(0.34,1.56,0.64,1), background 0.22s ease;
  }
  .bar-send:hover {
    width: 82px;
    background: linear-gradient(135deg, var(--c1) 0%, var(--c2) 55%, var(--c3) 100%);
  }
  .bar-send .send-star { flex-shrink: 0; transition: transform 0.18s ease; }
  .bar-send:hover .send-star { transform: rotate(15deg) scale(1.1); }
  .bar-send .send-label {
    font-size: 13px; font-weight: 600; white-space: nowrap;
    width: 0; overflow: hidden; opacity: 0;
    transition: width 0.20s cubic-bezier(0.34,1.56,0.64,1) 0.04s, opacity 0.16s ease 0.08s;
  }
  .bar-send:hover .send-label { width: 36px; opacity: 1; }

  /* ── Phone ── */
  .phone-wrap { display: flex; justify-content: center; }
  .phone {
    width: 200px; height: 400px;
    background: #1a1a1a; border-radius: 32px;
    box-shadow: 0 0 0 6px #111, 0 24px 56px rgba(0,0,0,0.35);
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .phone-screen {
    width: 188px; height: 388px;
    background: #ffffff; border-radius: 28px;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
  }
  .phone-inner {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    color: rgba(0,0,0,0.25); font-size: 12px;
  }
  .phone-inner svg { opacity: 0.25; }

  @property --cell-angle {
    syntax: '<angle>';
    initial-value: 0deg;
    inherits: false;
  }

  /* Phone outer frame — spinning gradient stroke + glow */
  .phone-frame {
    position: absolute; inset: 0; border-radius: 32px;
    pointer-events: none;
    border: var(--cell-stroke, 2px) solid transparent;
    background:
      transparent padding-box,
      conic-gradient(from var(--cell-angle), var(--c1), var(--c2), var(--c3), var(--c1)) border-box;
    animation:
      cell-border-spin var(--speed, 4s) linear infinite,
      cell-glow-spin   var(--speed, 4s) linear infinite;
  }

  @keyframes cell-border-spin {
    to { --cell-angle: 360deg; }
  }
  @keyframes cell-glow-spin {
    0%   { box-shadow: 0 0 var(--ci) var(--c1-rgb-glow), 0 0 var(--co) var(--c1-rgb-outer); }
    33%  { box-shadow: 0 0 var(--ci) var(--c2-rgb-glow), 0 0 var(--co) var(--c2-rgb-outer); }
    66%  { box-shadow: 0 0 var(--ci) var(--c3-rgb-glow), 0 0 var(--co) var(--c3-rgb-outer); }
    100% { box-shadow: 0 0 var(--ci) var(--c1-rgb-glow), 0 0 var(--co) var(--c1-rgb-outer); }
  }

  /* ── Controls panel ── */
  .controls {
    background: #fff; border-radius: 20px; padding: 28px;
    width: 300px; box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    display: flex; flex-direction: column; gap: 20px;
    align-self: flex-start;
  }
  .controls h3 { font-size: 14px; font-weight: 700; color: #0D0D0D; letter-spacing: -0.01em; }
  .section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: #bbb; margin-bottom: 2px;
  }
  .control-group { display: flex; flex-direction: column; gap: 14px; }
  .control-row { display: flex; flex-direction: column; gap: 6px; }
  .control-row label {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px; color: #555; font-weight: 500;
  }
  .control-row label span { color: #006AFF; font-weight: 600; font-variant-numeric: tabular-nums; }
  input[type=range] { width: 100%; accent-color: #006AFF; cursor: pointer; }
  .color-swatches { display: flex; gap: 8px; align-items: center; }
  .swatch-wrap {
    display: flex; flex-direction: column; align-items: center;
    gap: 4px; font-size: 10px; color: #999; font-weight: 500;
  }
  input[type=color] {
    width: 56px; height: 36px; border: none; border-radius: 8px;
    cursor: pointer; padding: 2px; background: none;
  }
  .divider { height: 1px; background: #F0F2F5; }
  .btn-copy {
    width: 100%; padding: 13px;
    background: #fff; color: #006AFF;
    border: 1.5px solid #006AFF; border-radius: 12px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: background 0.12s, color 0.12s;
  }
  .btn-copy:hover { background: #EEF4FF; }
  .btn-copy.copied { background: #006AFF; color: #fff; }
</style>
</head>
<body>

<!-- Left: previews -->
<div class="previews">

  <div class="preview-block">
    <div class="preview-label">Input bar</div>
    <div class="bar-wrap">
      <div class="lab-exp-bar" id="bar">
        <svg class="bar-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 1L9.6 5.8L14 8L9.6 10.2L8 15L6.4 10.2L2 8L6.4 5.8L8 1Z" fill="#006AFF"/>
        </svg>
        <input class="bar-input" placeholder="Describe what you want to explore…" />
        <button class="bar-send">
          <svg class="send-star" width="15" height="15" viewBox="0 0 16 16" fill="none">
            <path d="M8 1L9.6 5.8L14 8L9.6 10.2L8 15L6.4 10.2L2 8L6.4 5.8L8 1Z" fill="white"/>
          </svg>
          <span class="send-label">Send</span>
        </button>
      </div>
    </div>
  </div>

  <div class="preview-block">
    <div class="preview-label">Screen generating glow</div>
    <div class="phone-wrap">
      <div class="phone">
        <div class="phone-screen">
          <div class="phone-inner">
            <svg width="28" height="28" viewBox="0 0 16 16" fill="none">
              <path d="M8 1L9.6 5.8L14 8L9.6 10.2L8 15L6.4 10.2L2 8L6.4 5.8L8 1Z" fill="#006AFF"/>
            </svg>
            Generating…
          </div>
        </div>
        <div class="phone-frame" id="phone-frame"></div>
      </div>
    </div>
  </div>

</div>

<!-- Right: controls -->
<div class="controls">
  <h3>Gradient Parameters</h3>

  <div class="control-group">
    <div class="section-title">Colors</div>
    <div class="color-swatches">
      <div class="swatch-wrap">
        <input type="color" id="color1" value="#006AFF">
        <span>Color 1</span>
      </div>
      <div class="swatch-wrap">
        <input type="color" id="color2" value="#7C3AED">
        <span>Color 2</span>
      </div>
      <div class="swatch-wrap">
        <input type="color" id="color3" value="#EC4899">
        <span>Color 3</span>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <div class="section-title">Border</div>
    <div class="control-row">
      <label>Stroke width <span id="lbl-stroke">1.5px</span></label>
      <input type="range" id="stroke" min="0.5" max="6" step="0.5" value="1.5">
    </div>
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <div class="section-title">Glow</div>
    <div class="control-row">
      <label>Inner radius <span id="lbl-gi">16px</span></label>
      <input type="range" id="gi" min="0" max="60" step="1" value="16">
    </div>
    <div class="control-row">
      <label>Outer radius <span id="lbl-go">40px</span></label>
      <input type="range" id="go" min="0" max="120" step="2" value="40">
    </div>
    <div class="control-row">
      <label>Opacity <span id="lbl-op">0.55</span></label>
      <input type="range" id="op" min="0" max="1" step="0.01" value="0.55">
    </div>
  </div>

  <div class="divider"></div>

  <div class="control-group">
    <div class="section-title">Animation</div>
    <div class="control-row">
      <label>Speed <span id="lbl-speed">4.0s</span></label>
      <input type="range" id="speed" min="1" max="12" step="0.5" value="4">
    </div>
  </div>

  <div class="divider"></div>

  <button class="btn-copy" id="btn-copy" onclick="copyCss()">Copy CSS values</button>
</div>

<script>
  const c1 = document.getElementById('color1');
  const c2 = document.getElementById('color2');
  const c3 = document.getElementById('color3');
  const sStroke = document.getElementById('stroke');
  const sGi     = document.getElementById('gi');
  const sGo     = document.getElementById('go');
  const sOp     = document.getElementById('op');
  const sSpeed  = document.getElementById('speed');

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return [r, g, b];
  }

  function update() {
    const [r1,g1,b1] = hexToRgb(c1.value);
    const [r2,g2,b2] = hexToRgb(c2.value);
    const [r3,g3,b3] = hexToRgb(c3.value);
    const stroke = parseFloat(sStroke.value);
    const gi     = parseFloat(sGi.value);
    const go     = parseFloat(sGo.value);
    const op     = parseFloat(sOp.value);
    const speed  = parseFloat(sSpeed.value);

    document.getElementById('lbl-stroke').textContent = stroke.toFixed(1) + 'px';
    document.getElementById('lbl-gi').textContent     = gi + 'px';
    document.getElementById('lbl-go').textContent     = go + 'px';
    document.getElementById('lbl-op').textContent     = op.toFixed(2);
    document.getElementById('lbl-speed').textContent  = speed.toFixed(1) + 's';

    const root = document.documentElement;

    // Colors as CSS values
    root.style.setProperty('--c1', c1.value);
    root.style.setProperty('--c2', c2.value);
    root.style.setProperty('--c3', c3.value);

    // Glow rgba values for box-shadow animation
    root.style.setProperty('--c1-rgb-glow',  `rgba(${r1},${g1},${b1},${op})`);
    root.style.setProperty('--c2-rgb-glow',  `rgba(${r2},${g2},${b2},${op})`);
    root.style.setProperty('--c3-rgb-glow',  `rgba(${r3},${g3},${b3},${op})`);
    root.style.setProperty('--c1-rgb-outer', `rgba(${r1},${g1},${b1},${(op*0.45).toFixed(2)})`);
    root.style.setProperty('--c2-rgb-outer', `rgba(${r2},${g2},${b2},${(op*0.45).toFixed(2)})`);
    root.style.setProperty('--c3-rgb-outer', `rgba(${r3},${g3},${b3},${(op*0.45).toFixed(2)})`);

    // Glow sizes
    root.style.setProperty('--gi', gi + 'px');
    root.style.setProperty('--go', go + 'px');
    root.style.setProperty('--ci', (gi * 1.5).toFixed(0) + 'px');
    root.style.setProperty('--co', (go * 1.5).toFixed(0) + 'px');

    // Stroke & speed
    root.style.setProperty('--stroke', stroke + 'px');
    root.style.setProperty('--cell-stroke', (stroke * 1.5).toFixed(1) + 'px');
    root.style.setProperty('--speed', speed + 's');
  }

  function copyCss() {
    const [r1,g1,b1] = hexToRgb(c1.value);
    const [r2,g2,b2] = hexToRgb(c2.value);
    const [r3,g3,b3] = hexToRgb(c3.value);
    const stroke = parseFloat(sStroke.value);
    const gi     = parseFloat(sGi.value);
    const go     = parseFloat(sGo.value);
    const op     = parseFloat(sOp.value);
    const speed  = parseFloat(sSpeed.value);
    const opOuter = (op * 0.45).toFixed(2);

    const css =
`/* ── Gradient Glow — paste into playground.css ──────────────────────── */
/* Colors: ${c1.value} · ${c2.value} · ${c3.value}   stroke: ${stroke}px   speed: ${speed}s */

@property --bar-angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}

.lab-exp-bar {
  background:
    linear-gradient(#fff, #fff) padding-box,
    conic-gradient(from var(--bar-angle), ${c1.value}, ${c2.value}, ${c3.value}, ${c1.value}) border-box;
  border: ${stroke}px solid transparent;
  animation:
    lab-bar-border-spin ${speed}s linear infinite,
    lab-bar-glow-spin   ${speed}s linear infinite;
}

@keyframes lab-bar-border-spin {
  to { --bar-angle: 360deg; }
}

@keyframes lab-bar-glow-spin {
  0%, 100% { box-shadow: 0 0 ${gi}px rgba(${r1},${g1},${b1},${op}), 0 0 ${go}px rgba(${r1},${g1},${b1},${opOuter}), 0 2px 8px rgba(0,0,0,0.05); }
  33%       { box-shadow: 0 0 ${gi}px rgba(${r2},${g2},${b2},${op}), 0 0 ${go}px rgba(${r2},${g2},${b2},${opOuter}), 0 2px 8px rgba(0,0,0,0.05); }
  66%       { box-shadow: 0 0 ${gi}px rgba(${r3},${g3},${b3},${op}), 0 0 ${go}px rgba(${r3},${g3},${b3},${opOuter}), 0 2px 8px rgba(0,0,0,0.05); }
}

/* ── Phone cell generating glow ── */
@property --cell-angle {
  syntax: '<angle>';
  initial-value: 0deg;
  inherits: false;
}

.lab-phone-cell--generating .lab-phone-frame {
  border: ${(stroke * 1.5).toFixed(1)}px solid transparent;
  background: transparent padding-box,
    conic-gradient(from var(--cell-angle), ${c1.value}, ${c2.value}, ${c3.value}, ${c1.value}) border-box;
  animation:
    lab-cell-border-spin ${speed}s linear infinite,
    lab-cell-glow-spin   ${speed}s linear infinite;
}

@keyframes lab-cell-border-spin {
  to { --cell-angle: 360deg; }
}

@keyframes lab-cell-glow-spin {
  0%, 100% { box-shadow: 0 0 ${(gi*1.5).toFixed(0)}px rgba(${r1},${g1},${b1},${op}), 0 0 ${(go*1.5).toFixed(0)}px rgba(${r1},${g1},${b1},${opOuter}); }
  33%       { box-shadow: 0 0 ${(gi*1.5).toFixed(0)}px rgba(${r2},${g2},${b2},${op}), 0 0 ${(go*1.5).toFixed(0)}px rgba(${r2},${g2},${b2},${opOuter}); }
  66%       { box-shadow: 0 0 ${(gi*1.5).toFixed(0)}px rgba(${r3},${g3},${b3},${op}), 0 0 ${(go*1.5).toFixed(0)}px rgba(${r3},${g3},${b3},${opOuter}); }
}`;

    navigator.clipboard.writeText(css).then(() => {
      const btn = document.getElementById('btn-copy');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy CSS values'; btn.classList.remove('copied'); }, 2000);
    });
  }

  [c1, c2, c3, sStroke, sGi, sGo, sOp, sSpeed].forEach(el => el.addEventListener('input', update));
  update();
</script>
</body>
</html>
